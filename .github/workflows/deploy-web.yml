name: "Deploy Web"

on:
    push:
        branches:
            - main
            - demo
        paths:
            - apps/web/**
            - package.json
            - pnpm-lock.yaml
            - pnpm-workspace.yaml
            - turbo.json
            - .github/workflows/deploy-web.yml
    workflow_dispatch:

jobs:
    deploy:
        runs-on: ubuntu-latest
        name: deploy (${{ github.ref_name == 'main' && 'production' || 'demo' }})
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 9.7.0

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build web
              env:
                  VITE_BACKEND_URL: ${{ github.ref_name == 'main' && secrets.VITE_BACKEND_URL || secrets.VITE_BACKEND_URL_DEMO }}
              run: pnpm --filter web build

            - name: Deploy to Cloudflare Pages
              env:
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
              run: npx --yes wrangler@3.90.0 pages deploy apps/web/dist --project-name=${{ github.ref_name == 'main' && vars.CLOUDFLARE_PAGES_PROJECT || vars.CLOUDFLARE_PAGES_PROJECT_DEMO }} --branch=${{ github.ref_name }}
