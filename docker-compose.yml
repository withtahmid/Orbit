services:
    db:
        image: postgres:15
        container_name: orbit-db
        restart: unless-stopped
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: postgres
        volumes:
            - orbit_db_data:/var/lib/postgresql/data
        networks:
            - orbit
        ports:
            - 5432:5432

    maildev:
        image: maildev/maildev
        container_name: orbit-maildev
        user: root
        ports:
            - "1080:1080"
            - "1025:1025"
        environment:
            - MAILDEV_WEB_PORT=1080
            - MAILDEV_SMTP_PORT=1025
        volumes:
            - orbit_maildev_data:/tmp/maildev
        networks:
            - orbit

    orbit:
        container_name: orbit
        build:
            context: .
            dockerfile: Dockerfile

        restart: unless-stopped
        working_dir: /app
        command: pnpm dev

        ports:
            - target: 3000
              published: 3000

            - target: 5173
              published: 5173

        env_file:
            - ./.env.local

        volumes:
            - ./:/app
        depends_on:
            - db
            - maildev

        networks:
            - orbit
networks:
    orbit:
        driver: bridge

volumes:
    orbit_db_data:
    orbit_maildev_data:
