services:
    db:
        image: postgres:18
        container_name: orbit-db
        restart: unless-stopped
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: postgres
        volumes:
            - orbit_db_data:/var/lib/postgresql
        networks:
            - orbit
        ports:
            - 5432:5432

    maildev:
        image: maildev/maildev
        container_name: orbit-maildev
        user: root
        ports:
            - "1080:1080"
            - "1025:1025"
        environment:
            - MAILDEV_WEB_PORT=1080
            - MAILDEV_SMTP_PORT=1025
        volumes:
            - orbit_maildev_data:/tmp/maildev
        networks:
            - orbit

    # metabase:
    #     image: metabase/metabase:v0.60.1.x
    #     container_name: orbit-metabase
    #     restart: unless-stopped
    #     logging:
    #         driver: "none"
    #     ports:
    #         - "3001:3000"
    #     environment:
    #         - MB_DB_FILE=/metabase-data/metabase.db
    #     volumes:
    #         - orbit_metabase_data:/metabase-data
    #     depends_on:
    #         - db
    #     networks:
    #         - orbit

    orbit:
        container_name: orbit
        build:
            context: .
            dockerfile: Dockerfile

        restart: unless-stopped
        working_dir: /app
        command: sh -c "pnpm install --frozen-lockfile && pnpm dev"

        # Run as the host user so files created inside the bind-mounted
        # workspace (node_modules caches, .vite-temp, dist/) don't end up
        # owned by root and block subsequent host-level `pnpm build`.
        # Export UID/GID in your shell (or .env.local) — on Linux this is
        # usually: `export UID GID=$(id -g)`. Falls back to 1000:1000.
        user: "${UID:-1000}:${GID:-1000}"

        ports:
            - target: 3000
              published: 3000

            - target: 5173
              published: 5173

        env_file:
            - ./.env

        volumes:
            - ./:/app
        depends_on:
            - db
            - maildev

        networks:
            - orbit
networks:
    orbit:
        driver: bridge

volumes:
    orbit_db_data:
    orbit_maildev_data:
    orbit_metabase_data:
